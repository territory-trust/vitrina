<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-Pilot | Створення магазину</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a1128">
    <link rel="apple-touch-icon" href="app-icon-v2.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            /* Космічна синя палітра (V2) */
            --bg-color-top: #0a1930;
            --bg-color-bottom: #020617;
            --panel-bg: rgba(15, 23, 42, 0.75);
            --border-blue: rgba(59, 130, 246, 0.4);
            --accent-yellow: #FFD700;
            --input-bg: rgba(0, 0, 0, 0.4);
            --text-light: #e5e7eb;
            --text-blue: #93c5fd;
        }
        
        body { 
            background: linear-gradient(135deg, var(--bg-color-top) 0%, var(--bg-color-bottom) 100%); 
            color: var(--text-light); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100dvh; 
            padding: 15px; 
            box-sizing: border-box; 
        }
        
        .card { 
            background: var(--panel-bg); 
            padding: 35px 25px; 
            border-radius: 24px; 
            border: 1px solid var(--border-blue); 
            width: 100%; max-width: 440px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-sizing: border-box;
        }
        
        .logo-img {
            max-width: 70%; 
            height: auto;
            display: block;
            margin: 0 auto 20px auto; 
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.8)); 
            border-radius: 12px;
        }
        
        p { 
            text-align: center; 
            color: var(--text-blue); 
            font-size: 16px; 
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 25px; 
            line-height: 1.4; 
        }
        
        label { 
            display: block; 
            margin-bottom: 6px; 
            color: var(--accent-yellow); /* Яскраво-жовтий колір тексту */
            font-weight: 700; 
            font-size: 15px; 
            letter-spacing: 0.5px;
        }
        
        input { 
            width: 100%; padding: 15px; 
            background: var(--input-bg); 
            border: 1px solid var(--border-blue); 
            color: #fff; border-radius: 12px; font-size: 16px; 
            margin-bottom: 18px; outline: none; box-sizing: border-box; 
            transition: 0.3s ease; 
            font-weight: 600;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        
        input::placeholder {
            color: rgba(255,255,255,0.3);
            font-weight: normal;
        }
        
        input:focus { 
            border-color: #60a5fa; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3), inset 0 2px 4px rgba(0,0,0,0.3); 
            background: rgba(0,0,0,0.6);
        }
        
        /* 3D-Кнопка (Синя основа + Жовтий текст) */
        .btn-3d { 
            background: linear-gradient(180deg, #2563eb 0%, #1e40af 100%); 
            color: var(--accent-yellow); 
            padding: 16px; border-radius: 12px; 
            font-weight: 900; font-size: 18px; border: none; cursor: pointer; 
            box-shadow: 0 5px 0 #0f172a, 0 10px 15px rgba(0,0,0,0.5); 
            width: 100%; display: block; 
            text-align: center; transition: 0.1s ease; 
            margin-top: 15px; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .btn-3d:active { 
            transform: translateY(5px); 
            box-shadow: 0 0 0 #0f172a, 0 2px 4px rgba(0,0,0,0.5); 
        }
        .btn-3d:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .switch-mode { text-align: center; margin-top: 25px; color: var(--text-blue); font-size: 15px; }
        .switch-mode span { color: var(--accent-yellow); font-weight: bold; cursor: pointer; text-decoration: underline; transition: 0.2s;}
        .switch-mode span:active { opacity: 0.7; }
        
        #errorMsg { 
            color: #fca5a5; text-align: center; margin-top: 15px; 
            display: none; font-size: 14px; background: rgba(239, 68, 68, 0.15); 
            padding: 12px; border-radius: 10px; border: 1px solid rgba(239, 68, 68, 0.3);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="1000007790.jpg" alt="AI-Pilot Shops" class="logo-img">
    
    <p id="subtitle">Створіть розумний інтернет-магазин<br>за 1 хвилину.</p>

    <div id="registerFields">
        <label>Назва вашого магазину:</label>
        <input type="text" id="shopName" placeholder="Наприклад: КАНЦЛЕР">
        
        <label>Ваше Ім'я:</label>
        <input type="text" id="userName" placeholder="Наприклад: Вадим">
    </div>

    <label>Ваш телефон:</label>
    <input type="tel" id="phone" placeholder="098 555 44 22" maxlength="13" oninput="formatPhone(this)">

    <button class="btn-3d" id="mainBtn" onclick="handleAuth()">🚀 СТВОРИТИ МАГАЗИН</button>
    <div id="errorMsg"></div>

    <div class="switch-mode" id="switchText">
        Вже є магазин? <span onclick="toggleMode()">Увійти за телефоном</span>
    </div>
</div>

<script>
    const sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
    let isLogin = false;

    function formatPhone(input) {
        let val = input.value.replace(/\D/g, '');
        let res = '';
        if (val.length > 0) res += val.substring(0, 3);
        if (val.length > 3) res += ' ' + val.substring(3, 6);
        if (val.length > 6) res += ' ' + val.substring(6, 8);
        if (val.length > 8) res += ' ' + val.substring(8, 10);
        input.value = res;
    }

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('registerFields').style.display = isLogin ? 'none' : 'block';
        document.getElementById('mainBtn').innerHTML = isLogin ? '🔑 УВІЙТИ В КАБІНЕТ' : '🚀 СТВОРИТИ МАГАЗИН';
        
        document.getElementById('subtitle').innerHTML = isLogin 
            ? 'Вхід у панель керування<br>вашим магазином.' 
            : 'Створіть розумний інтернет-магазин<br>за 1 хвилину.';
            
        document.getElementById('switchText').innerHTML = isLogin 
            ? 'Новий користувач? <span onclick="toggleMode()">Створити магазин</span>' 
            : 'Вже є магазин? <span onclick="toggleMode()">Увійти за телефоном</span>';
        document.getElementById('errorMsg').style.display = 'none';
    }

    function showError(msg) {
        const e = document.getElementById('errorMsg');
        e.innerHTML = '❌ Помилка: ' + msg;
        e.style.display = 'block';
    }

    async function handleAuth() {
        const phoneRaw = document.getElementById('phone').value.replace(/\D/g, '');
        if (phoneRaw.length !== 10) return showError('Введіть коректний номер телефону (10 цифр)');
        
        const email = `${phoneRaw}@ai-pilot.com.ua`;
        const password = `Pass${phoneRaw}!`;
        const btn = document.getElementById('mainBtn');
        btn.disabled = true; document.getElementById('errorMsg').style.display = 'none';

        try {
            if (isLogin) {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw new Error('Користувача не знайдено або невірний номер.');
                window.location.href = 'cabinet.html';
            } else {
                const shopName = document.getElementById('shopName').value.trim();
                const userName = document.getElementById('userName').value.trim();
                if (!shopName || !userName) throw new Error('Заповніть всі поля!');

                const { data: authData, error: authErr } = await sb.auth.signUp({ email, password });
                if (authErr) {
                    if (authErr.message.includes('already registered')) throw new Error('Цей номер вже зареєстровано. Увійдіть.');
                    throw authErr;
                }

                if (authData.user) {
                    // ЗМІНА: Зміна теми по замовчуванню на 'light'
                    const { error: dbErr } = await sb.from('shops').insert([{
                        owner_id: authData.user.id,
                        name: shopName,
                        shop_name: shopName,
                        theme_color: 'light',
                        is_demo: false
                    }]);
                    if (dbErr) throw dbErr;
                    window.location.href = 'cabinet.html';
                }
            }
        } catch (err) {
            showError(err.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
