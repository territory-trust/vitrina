<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-Pilot | Кабінет Продавця</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0f12">
    <link rel="apple-touch-icon" href="icon-512.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --bg: #0d0f12; --panel: #14171c; --olive: #6b873b; --olive-dark: #465926; --text: #e5e7eb; --text-muted: #aaa; --border: #2a2e35; --input-bg: #050505; --input-border: #666; --card-bg: #1a1e24; --card-border: #333; --pwa-accent: #eab308; }
        body.theme-light { --bg: #f9fafb; --panel: #ffffff; --olive: #6b873b; --olive-dark: #465926; --text: #111827; --text-muted: #4b5563; --border: #e5e7eb; --input-bg: #ffffff; --input-border: #a1a1aa; --card-bg: #ffffff; --card-border: #e5e7eb; --pwa-accent: var(--olive-dark); }
        body.theme-neutral { --bg: #f5f5f5; --panel: #fafafa; --olive: #64748b; --olive-dark: #475569; --text: #1e293b; --text-muted: #475569; --border: #cbd5e1; --input-bg: #ffffff; --input-border: #94a3b8; --card-bg: #ffffff; --card-border: #cbd5e1; --pwa-accent: var(--olive-dark); }
        body.theme-ocean { --bg: #051622; --panel: #0a2235; --olive: #2a8bf2; --olive-dark: #1565c0; --text: #e2f1ff; --text-muted: #7d9cb8; --border: #143554; --input-bg: #020a10; --input-border: #1e6bc4; --card-bg: #0d2840; --card-border: #1a426b; --pwa-accent: #eab308; }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; font-size: 16px; padding-top: 70px; padding-bottom: 80px; transition: background 0.3s, color 0.3s; }
        
        .header { position: fixed; top: 0; left: 0; width: 100%; background: var(--panel); border-bottom: 1px solid var(--border); z-index: 1000; padding: 15px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; }
        .shop-title { color: var(--olive); font-size: 20px; font-weight: bold; margin: 0; text-transform: uppercase;}
        
        .header-links a { color: var(--text); text-decoration: none; font-size: 15px; border: 2px solid var(--olive); padding: 8px 16px; border-radius: 8px; font-weight: bold; background: var(--input-bg); box-shadow: 0 3px 6px rgba(0,0,0,0.15); display: inline-block; }

        .container { max-width: 800px; margin: 0 auto; padding: 15px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-top: 0; color: var(--text); display: flex; align-items: center; gap: 8px;}

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-weight: 500; font-size: 15px; }
        
        input[type="text"], input[type="number"], input[type="date"], select, textarea { 
            width: 100%; padding: 14px; background: var(--input-bg); 
            border: 2px solid var(--input-border) !important; 
            color: var(--text); border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; 
        }
        input:focus, textarea:focus { border-color: var(--olive) !important; box-shadow: 0 0 0 3px rgba(107, 135, 59, 0.2) !important; }

        .btn-3d { background: linear-gradient(180deg, var(--olive) 0%, var(--olive-dark) 100%); color: #fff; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 15px; border: none; cursor: pointer; box-shadow: 0 4px 0 var(--olive-dark); width: 100%; display: block; text-align: center; text-transform: uppercase; }
        .btn-3d:active { transform: translateY(4px); box-shadow: none; }

        /* СКЛАД: ДВОРІВНЕВА НАВІГАЦІЯ */
        .nav-scroll-wrapper { position: sticky; top: 64px; background: var(--bg); z-index: 100; border-bottom: 1px dashed var(--border); margin: 0 -15px 15px -15px; padding: 10px 15px; }
        .nav-scroll { overflow-x: auto; white-space: nowrap; scrollbar-width: none; display: flex; gap: 8px; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--card-bg); color: var(--text); border: 1px solid #888; padding: 7px 16px; border-radius: 15px; font-size: 13px; cursor: pointer; font-weight: 600; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
        .cat-btn.active { background: var(--olive); color: #fff; border-color: var(--olive); box-shadow: none; }
        #sub-cat-container { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: none; }
        .sub-btn { font-size: 11px; padding: 5px 12px; border-style: dashed; }

        /* КАРТКА ТОВАРУ */
        .inv-item { background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 12px; margin-bottom: 12px; position: relative; z-index: 1;}
        .inv-top { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
        .inv-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: var(--bg); border: 1px solid var(--card-border); }
        .inv-info { flex: 1; min-width: 0; }
        .inv-title { font-weight: bold; font-size: 14px; margin-bottom: 6px; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* КУСТОМНИЙ ДРОПДАУН ПЕРЕМІЩЕННЯ */
        .custom-select-wrapper { position: relative; width: 100%; max-width: 220px; margin-bottom: 6px; user-select: none; }
        .custom-select-trigger { padding: 6px 12px; background: var(--bg); border: 2px solid var(--input-border); color: var(--olive); border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .custom-select-trigger::after { content: '▼'; font-size: 10px; color: var(--text-muted); }
        .custom-select-options { position: absolute; top: 100%; left: 0; right: 0; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 100; display: none; max-height: 220px; overflow-y: auto; margin-top: 4px; }
        .custom-select-wrapper.open .custom-select-options { display: block; }
        .custom-select-option { padding: 10px 12px; font-size: 13px; color: var(--text); cursor: pointer; border-bottom: 1px solid var(--border); }
        .opt-parent { background: rgba(107, 135, 59, 0.05); font-weight: bold; color: var(--olive); }
        .opt-sub { padding-left: 25px; font-size: 12px; border-bottom-style: dashed; }
        .custom-select-option:hover { background: rgba(107, 135, 59, 0.1); }

        .inv-actions { display: flex; gap: 8px; align-items: flex-end; border-top: 1px solid var(--border); padding-top: 12px; }
        .inv-col { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .inv-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .inv-input { width: 100%; padding: 10px 5px; background: var(--bg); border: 2px solid var(--input-border); color: var(--text); font-weight: bold; border-radius: 6px; text-align: center; }
        .inv-save-btn { flex: 1.5; background: var(--olive); color: #fff; border: none; padding: 10px 0; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold; height: 41px; }
        .inv-del-btn { background: rgba(255,68,68,0.1); color: #ff4444; border: 1px solid rgba(255,68,68,0.3); padding: 10px; border-radius: 6px; cursor: pointer; height: 41px; display: flex; align-items: center; justify-content: center; }

        /* КОНСТРУКТОР КАТЕГОРІЙ */
        .cat-editor-container { background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .cat-group { border-bottom: 1px dashed var(--border); padding-bottom: 12px; margin-bottom: 12px; }
        .cat-group:last-child { border-bottom: none; }
        .cat-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .sub-row { display: flex; gap: 8px; align-items: center; margin-left: 25px; margin-bottom: 6px; }
        .cat-input { flex: 1; padding: 8px 12px !important; font-size: 14px !important; }
        .btn-add-sub { background: transparent; border: 1px dashed var(--olive); color: var(--olive); padding: 6px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-left: 25px; font-weight: bold; }
        .btn-del-row { background: transparent; border: none; color: #ff4444; font-size: 18px; cursor: pointer; padding: 0 5px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { background: transparent; border: none; color: var(--text-muted); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 20%; }
        .nav-item.active { color: var(--olive); font-weight: bold; }
        .nav-icon { font-size: 22px; }

        .custom-alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; backdrop-filter: blur(4px); }
        .custom-alert-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: none; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="shop-title" id="cabinetTitle">Магазин</div>
        <div class="header-links"><a href="shop.html" id="shopLink" target="_blank">Вітрина</a></div>
    </div>

    <div class="container">
        <div id="tab-inventory" class="section">
            <h2>📦 Склад та Керування</h2>
            <div class="nav-scroll-wrapper">
                <div class="nav-scroll" id="inv-cat-main"></div>
                <div class="nav-scroll" id="sub-cat-container"></div>
            </div>
            <div class="input-group"><input type="text" id="searchInv" placeholder="🔎 Пошук..." oninput="filterInventory()" autocomplete="off"></div>
            <div id="inventoryList"></div>
        </div>

        <div id="tab-agents" class="section active">
            <h2>➕ НОВИЙ ТОВАР</h2>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;"><label>Ціна:</label><input type="number" id="price" placeholder="Авто"></div>
                <div class="input-group" style="flex: 1;"><label>Кількість:</label><input type="number" id="qty" value="1"></div>
            </div>
            
            <label>1. Головне фото:</label>
            <div class="flex-btns">
                <label class="file-label" id="l1_cam"><input type="file" id="p1_cam" accept="image/*" capture="environment" onchange="updLbl('l1_cam', 'l1_gal', 'p1_cam', 1)"><span>📷 Камера</span></label>
                <label class="file-label" id="l1_gal"><input type="file" id="p1_gal" accept="image/*" onchange="updLbl('l1_cam', 'l1_gal', 'p1_gal', 1)"><span>🖼 Галерея</span></label>
            </div>
            <label>2. Деталі:</label>
            <div class="flex-btns">
                <label class="file-label" id="l2_cam"><input type="file" id="p2_cam" accept="image/*" capture="environment" onchange="updLbl('l2_cam', 'l2_gal', 'p2_cam', 2)"><span>📷 Камера</span></label>
                <label class="file-label" id="l2_gal"><input type="file" id="p2_gal" accept="image/*" onchange="updLbl('l2_cam', 'l2_gal', 'p2_gal', 2)"><span>🖼 Галерея</span></label>
            </div>
            <button class="btn-3d" id="mainBtn" onclick="startAI()" style="margin-top: 15px;">АНАЛІЗ ТА ПУБЛІКАЦІЯ</button>
            <div id="status" style="margin-top: 20px; padding: 15px; border-radius: 8px; background: var(--input-bg); color: var(--text); border-left: 4px solid var(--olive); display: none; white-space: pre-wrap;"></div>
        </div>

        <div id="tab-settings" class="section">
            <div class="settings-block">
                <h3>🏪 НАЛАШТУВАННЯ МАГАЗИНУ</h3>
                <div class="input-group"><label>Назва:</label><input type="text" id="set_shopName"></div>
                
                <label>КАТЕГОРИЇ ТОВАРІВ:</label>
                <div id="cat-editor" class="cat-editor-container"></div>
                <button class="btn-3d" onclick="addNewCategory()" style="padding: 10px; font-size: 12px; margin-bottom: 20px;">➕ ДОДАТИ КАТЕГОРІЮ</button>
                
                <div class="input-group"><label>Опис:</label><textarea id="set_description"></textarea></div>
            </div>

            <div class="settings-block">
                <h3>🎨 ТЕМА</h3>
                <div class="theme-grid">
                    <div class="theme-card" id="theme_dark" onclick="selectTheme('dark')"><div class="theme-color-box t-dark"></div>Dark</div>
                    <div class="theme-card" id="theme_ocean" onclick="selectTheme('ocean')"><div class="theme-color-box t-ocean"></div>Ocean</div>
                    <div class="theme-card" id="theme_light" onclick="selectTheme('light')"><div class="theme-color-box t-light"></div>Light</div>
                    <div class="theme-card" id="theme_neutral" onclick="selectTheme('neutral')"><div class="theme-color-box t-neutral"></div>Neutral</div>
                </div>
                <input type="hidden" id="set_theme" value="dark">
            </div>
            <button class="btn-3d" id="saveSettingsBtn" onclick="saveSettings()">💾 ЗБЕРЕГТИ ВСЕ</button>
        </div>
    </div>

    <div id="customAlertOverlay" class="custom-alert-overlay" onclick="closeAlert()"></div>
    <div id="customAlertBox" class="custom-alert-box"><p id="customAlertText"></p><button class="btn-3d" onclick="closeAlert()">ОК</button></div>

    <div class="bottom-nav">
        <button class="nav-item" onclick="switchTab('tab-inventory', this)"><span class="nav-icon">📦</span>Склад</button>
        <button class="nav-item active" onclick="switchTab('tab-agents', this)"><span class="nav-icon">➕</span>Товар</button>
        <button class="nav-item" onclick="switchTab('tab-settings', this)"><span class="nav-icon">⚙️</span>Налашт.</button>
    </div>

    <script>
        const sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
        let currentUser = null; let inventoryData = []; let categoriesMap = {};
        let currentInvCat = 'Все'; let currentInvSubCat = 'Все';
        let selectedFiles = [null, null]; let uploadedUrls = []; let pendingAiData = null;

        function showAlert(msg) { document.getElementById('customAlertText').innerText = msg; document.getElementById('customAlertOverlay').style.display = 'block'; document.getElementById('customAlertBox').style.display = 'block'; }
        function closeAlert() { document.getElementById('customAlertOverlay').style.display = 'none'; document.getElementById('customAlertBox').style.display = 'none'; }

        window.onload = async () => {
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                currentUser = user;
                const { data: shop } = await sb.from('shops').select('*').eq('owner_id', user.id).single();
                if(shop) {
                    document.getElementById('cabinetTitle').innerText = shop.shop_name || 'Магазин';
                    document.getElementById('set_shopName').value = shop.shop_name || '';
                    document.getElementById('set_description').value = shop.description || '';
                    loadCategoryEditor(shop.categories);
                    selectTheme(shop.theme_color || 'dark', false);
                }
                loadInventory();
            } else { window.location.href = 'landing.html'; }
        };

        // КОНСТРУКТОР КАТЕГОРИЙ
        function loadCategoryEditor(catStr) {
            const container = document.getElementById('cat-editor');
            container.innerHTML = '';
            categoriesMap = {};
            if(!catStr) return;
            const groups = catStr.split(';').filter(Boolean);
            groups.forEach((g, idx) => {
                const parts = g.split(':');
                const main = parts[0];
                const subs = parts[1] ? parts[1].split(',') : [];
                categoriesMap[main] = subs;
                createCategoryBlock(main, subs, idx);
            });
        }

        function createCategoryBlock(main, subs, id) {
            const container = document.getElementById('cat-editor');
            const div = document.createElement('div');
            div.className = 'cat-group';
            div.innerHTML = `
                <div class="cat-row">
                    <input type="text" class="cat-input main-cat-val" value="${main}" placeholder="Назва категорії">
                    <button class="btn-del-row" onclick="this.parentElement.parentElement.remove()">🗑️</button>
                </div>
                <div class="sub-container">
                    ${subs.map(s => `<div class="sub-row"><input type="text" class="cat-input sub-cat-val" value="${s}"><button class="btn-del-row" onclick="this.parentElement.remove()">×</button></div>`).join('')}
                </div>
                <button class="btn-add-sub" onclick="addNewSub(this)">+ Підкатегорія</button>
            `;
            container.appendChild(div);
        }

        function addNewCategory() { createCategoryBlock('', [], Date.now()); }
        function addNewSub(btn) {
            const subDiv = document.createElement('div');
            subDiv.className = 'sub-row';
            subDiv.innerHTML = `<input type="text" class="cat-input sub-cat-val" placeholder="Підкатегорія"><button class="btn-del-row" onclick="this.parentElement.remove()">×</button>`;
            btn.previousElementSibling.appendChild(subDiv);
        }

        async function saveSettings() {
            const btn = document.getElementById('saveSettingsBtn'); btn.innerText = '⏳...';
            let finalCatStr = '';
            document.querySelectorAll('.cat-group').forEach(group => {
                const main = group.querySelector('.main-cat-val').value.trim();
                const subs = Array.from(group.querySelectorAll('.sub-cat-val')).map(i => i.value.trim()).filter(Boolean);
                if(main) finalCatStr += `${main}${subs.length ? ':' + subs.join(',') : ''};`;
            });
            const update = { shop_name: document.getElementById('set_shopName').value, categories: finalCatStr, description: document.getElementById('set_description').value, theme_color: document.getElementById('set_theme').value };
            await sb.from('shops').update(update).eq('owner_id', currentUser.id);
            btn.innerText = '✅ ЗБЕРЕЖЕНО';
            setTimeout(() => { btn.innerText = '💾 ЗБЕРЕГТИ ВСЕ'; location.reload(); }, 1500);
        }

        // СКЛАД
        async function loadInventory() {
            const { data } = await sb.from('products').select('*').eq('owner_id', currentUser.id).order('created_at', { ascending: false });
            inventoryData = data || [];
            const { data: shop } = await sb.from('shops').select('categories').eq('owner_id', currentUser.id).single();
            if(shop?.categories) parseCats(shop.categories);
            renderInvNav();
            filterInventory();
        }

        function parseCats(str) {
            categoriesMap = {};
            str.split(';').filter(Boolean).forEach(g => {
                const p = g.split(':');
                categoriesMap[p[0]] = p[1] ? p[1].split(',') : [];
            });
        }

        function renderInvNav() {
            const main = document.getElementById('inv-cat-main');
            main.innerHTML = `<button class="cat-btn ${currentInvCat === 'Все' ? 'active' : ''}" onclick="setInvCat('Все')">Всі</button>`;
            Object.keys(categoriesMap).forEach(c => {
                main.innerHTML += `<button class="cat-btn ${currentInvCat === c ? 'active' : ''}" onclick="setInvCat('${c}')">${c}</button>`;
            });
            const sub = document.getElementById('sub-cat-container');
            if(currentInvCat === 'Все' || !categoriesMap[currentInvCat]?.length) { sub.style.display = 'none'; return; }
            sub.style.display = 'flex';
            sub.innerHTML = `<button class="cat-btn sub-btn ${currentInvSubCat === 'Все' ? 'active' : ''}" onclick="setInvSubCat('Все')">Усі ${currentInvCat}</button>`;
            categoriesMap[currentInvCat].forEach(s => {
                sub.innerHTML += `<button class="cat-btn sub-btn ${currentInvSubCat === s ? 'active' : ''}" onclick="setInvSubCat('${s}')">${s}</button>`;
            });
        }

        function setInvCat(c) { currentInvCat = c; currentInvSubCat = 'Все'; renderInvNav(); filterInventory(); }
        function setInvSubCat(s) { currentInvSubCat = s; renderInvNav(); filterInventory(); }

        function filterInventory() {
            let list = inventoryData;
            if(currentInvCat !== 'Все') list = list.filter(i => i.category === currentInvCat);
            if(currentInvSubCat !== 'Все') list = list.filter(i => i.subcategory === currentInvSubCat);
            const q = document.getElementById('searchInv').value.toLowerCase();
            if(q) list = list.filter(i => i.title.toLowerCase().includes(q));
            renderItems(list);
        }

        function renderItems(list) {
            const container = document.getElementById('inventoryList');
            container.innerHTML = list.length ? '' : '<p style="text-align:center; opacity:0.5;">Порожньо</p>';
            list.forEach(p => {
                let opts = '';
                Object.keys(categoriesMap).forEach(m => {
                    opts += `<div class="custom-select-option opt-parent">📁 ${m}</div>`;
                    opts += `<div class="custom-select-option opt-sub" onclick="moveItem('${p.id}','${m}','')">→ Тільки ${m}</div>`;
                    categoriesMap[m].forEach(s => opts += `<div class="custom-select-option opt-sub" onclick="moveItem('${p.id}','${m}','${s}')">→ ${s}</div>`);
                });
                container.innerHTML += `
                    <div class="inv-item">
                        <div class="inv-top">
                            <img src="${p.image_url_1 || p.images?.[0] || ''}" class="inv-img">
                            <div class="inv-info">
                                <div class="inv-title">${p.title}</div>
                                <div class="custom-select-wrapper" id="move_${p.id}">
                                    <div class="custom-select-trigger" onclick="toggleMove('${p.id}', event)">📍 ${p.category}${p.subcategory ? ' > ' + p.subcategory : ''}</div>
                                    <div class="custom-select-options">${opts}</div>
                                </div>
                            </div>
                        </div>
                        <div class="inv-actions">
                            <div class="inv-col"><span class="inv-label">грн</span><input type="number" class="inv-input" id="pr_${p.id}" value="${p.price}"></div>
                            <div class="inv-col"><span class="inv-label">шт</span><input type="number" class="inv-input" id="qt_${p.id}" value="${p.quantity || 0}"></div>
                            <button class="inv-save-btn" onclick="saveInvItem('${p.id}')">💾</button>
                            <button class="inv-del-btn" onclick="deleteInvItem('${p.id}')">🗑️</button>
                        </div>
                    </div>`;
            });
        }

        async function moveItem(id, cat, sub) {
            await sb.from('products').update({ category: cat, subcategory: sub }).eq('id', id);
            loadInventory();
        }

        function toggleMove(id, e) {
            e.stopPropagation();
            document.querySelectorAll('.custom-select-wrapper').forEach(w => { if(w.id !== 'move_'+id) w.classList.remove('open'); });
            document.getElementById('move_'+id).classList.toggle('open');
        }

        async function saveInvItem(id) {
            const price = document.getElementById('pr_'+id).value;
            const quantity = document.getElementById('qt_'+id).value;
            await sb.from('products').update({ price: parseFloat(price), quantity: parseInt(quantity) }).eq('id', id);
            showAlert("Збережено!");
        }

        async function deleteInvItem(id) {
            if(confirm("Видалити товар?")) { await sb.from('products').delete().eq('id', id); loadInventory(); }
        }

        // AI ТОВАР
        function updLbl(c, g, i, idx) {
            const f = document.getElementById(i).files[0];
            if(f) {
                selectedFiles[idx-1] = f;
                const active = document.getElementById(i.includes('cam') ? c : g);
                active.style.background = 'rgba(107, 135, 59, 0.2)';
                active.querySelector('span').innerText = '✅ Є';
            }
        }

        async function startAI() {
            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('status');
            if(pendingAiData) {
                btn.innerText = '⏳ ПУБЛІКАЦІЯ...';
                await sb.from('products').insert([{
                    title: pendingAiData.title, category: pendingAiData.category, subcategory: pendingAiData.subcategory,
                    price: parseFloat(document.getElementById('price').value) || pendingAiData.price,
                    quantity: parseInt(document.getElementById('qty').value) || 1,
                    images: uploadedUrls, owner_id: currentUser.id, status: 'available'
                }]);
                location.reload();
                return;
            }
            if(!selectedFiles[0]) return showAlert("Фото!");
            btn.disabled = true; status.style.display = 'block'; status.innerText = '⏳ Аналіз...';
            
            try {
                const reader = new FileReader();
                reader.readAsDataURL(selectedFiles[0]);
                reader.onload = async () => {
                    const b64 = reader.result.split(',')[1];
                    const catKeys = Object.keys(categoriesMap).join(', ');
                    const prompt = `Поверни JSON: {"title":"Назва","category":"з [${catKeys}]","subcategory":"підкатегорія","price":500}. Мова: українська.`;
                    
                    // Завантаження фото
                    for(let i=0; i<selectedFiles.length; i++) {
                        if(selectedFiles[i]) {
                            const n = `${Date.now()}_${i}.jpg`;
                            await sb.storage.from('smart_media').upload(n, selectedFiles[i]);
                            uploadedUrls.push(sb.storage.from('smart_media').getPublicUrl(n).data.publicUrl);
                        }
                    }

                    const { data: res } = await sb.functions.invoke('gemini-agent', { body: { prompt, imageBase64: b64 } });
                    const ai = JSON.parse(res.description.replace(/```json|```/gi, ''));
                    pendingAiData = ai;
                    document.getElementById('price').value = ai.price;
                    status.innerText = `✅ ГОТОВО: ${ai.title}\nКатегорія: ${ai.category}`;
                    btn.disabled = false; btn.innerText = '✅ ПУБЛІКУВАТИ';
                };
            } catch(e) { showAlert("Помилка"); btn.disabled = false; }
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            btn.classList.add('active'); document.getElementById(id).classList.add('active');
        }

        function selectTheme(t, save = true) {
            document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
            document.getElementById('theme_'+t).classList.add('active');
            document.getElementById('set_theme').value = t;
            document.body.className = t === 'dark' ? '' : 'theme-'+t;
            if(save) sb.from('shops').update({ theme_color: t }).eq('owner_id', currentUser.id);
        }

        document.addEventListener('click', () => document.querySelectorAll('.custom-select-wrapper').forEach(w => w.classList.remove('open')));
    </script>
</body>
</html>
