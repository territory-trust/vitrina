<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Опис товару | AI-Pilot</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --bg: #0d0f12; --panel: #14171c; --olive: #6b873b; --text: #e5e7eb; --border: #2a2e35; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        
        /* Шапка з кнопкою Назад */
        .header { position: fixed; top: 0; left: 0; width: 100%; background: rgba(13, 15, 18, 0.95); z-index: 100; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); padding: 12px 15px; box-sizing: border-box; }
        .back-btn { background: #1a1e24; color: #ccc; border: 1px solid #333; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-weight: 600; font-size: 15px; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
        .back-btn:active { transform: scale(0.95); background: #2a2e35; }

        /* Контент товару */
        .content { margin-top: 65px; max-width: 600px; margin-left: auto; margin-right: auto; background: var(--panel); min-height: 100vh;}
        .img-wrap { width: 100%; aspect-ratio: 1; background: #000; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-wrap { padding: 20px; }
        .title { font-size: 22px; font-weight: bold; color: #fff; margin: 0 0 10px 0; line-height: 1.3; }
        .price { font-size: 26px; font-weight: 900; color: var(--olive); margin-bottom: 20px; }
        
        .desc-box { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: #ccc; font-size: 16px; line-height: 1.6; }
        
        /* Нижня панель з кнопкою */
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--panel); border-top: 1px solid var(--border); padding: 15px 20px; box-sizing: border-box; z-index: 100; display: flex; justify-content: center;}
        .btn-buy { max-width: 600px; width: 100%; background: linear-gradient(180deg, var(--olive) 0%, #465926 100%); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #2c3818; transition: 0.1s; text-transform: uppercase; letter-spacing: 1px;}
        .btn-buy:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

<div class="header">
    <a href="shop.html" id="backBtn" class="back-btn">⬅ Назад</a>
</div>

<div class="content" id="contentBox">
    <div style="text-align:center; padding: 50px; color:#888;">Завантаження...</div>
</div>

<div class="bottom-bar">
    <button class="btn-buy" onclick="alert('Кошик та оформлення замовлення будуть підключені на наступному етапі!')">ЗАМОВИТИ</button>
</div>

<script>
    const sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if(!id) {
            document.getElementById('contentBox').innerHTML = '<div style="padding:40px; text-align:center; color:#ff4444;">❌ Товар не знайдено</div>';
            return;
        }

        // Завантажуємо товар та його розумний опис від ІІ
        const { data: p, error } = await sb.from('products').select('*, ai_content(fancy_description)').eq('id', id).single();
        
        if (error || !p) {
            document.getElementById('contentBox').innerHTML = '<div style="padding:40px; text-align:center; color:#ff4444;">❌ Помилка завантаження товару</div>';
            return;
        }

        // ДИНАМІЧНА КНОПКА "НАЗАД": повертаємо покупця в магазин продавця
        const backBtn = document.getElementById('backBtn');
        if (p.owner_id) {
            backBtn.href = `shop.html?owner=${p.owner_id}`;
        }

        // Витягуємо ІІ-опис
        let desc = '<span style="color:#666;">Опис відсутній.</span>';
        if (p.ai_content && p.ai_content.length > 0 && p.ai_content[0].fancy_description) {
            desc = p.ai_content[0].fancy_description;
        } else if (p.description) {
            desc = p.description;
        }

        let imgUrl = p.image_url_1 || (p.images && p.images[0]) || p.image_url || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
        
        document.getElementById('contentBox').innerHTML = `
            <div class="img-wrap">
                <img src="${imgUrl}" alt="${p.title}">
            </div>
            <div class="info-wrap">
                <h1 class="title">${p.title || 'Товар без назви'}</h1>
                <div class="price">${p.price} грн</div>
                <div class="desc-box">${desc}</div>
            </div>
        `;
    };
</script>
</body>
</html>
