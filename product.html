<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Завантаження товару...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        /* БАГАТИЙ ОКСАМИТОВИЙ СТИЛЬ */
        :root { --bg: #0d0f12; --panel: #14171c; --olive: #6b873b; --text: #e5e7eb; --border: #2a2e35; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; font-size: 16px; padding-bottom: 100px;}
        
        .nav-top { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: var(--panel); color: #fff; padding: 12px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; border: 1px solid var(--border); }
        
        .product-container { background: var(--panel); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; max-width: 800px; margin: 0 auto; }
        
        .gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; background: #000; border-bottom: 1px solid var(--border);}
        .gallery img { width: 100%; max-height: 400px; object-fit: contain; scroll-snap-align: center; flex: 0 0 100%; }
        
        .info { padding: 25px; }
        .title { font-size: 24px; font-weight: 900; color: #fff; margin-top: 0; line-height: 1.3; }
        .price-tag { display: inline-block; background: rgba(107, 135, 59, 0.15); color: var(--olive); padding: 10px 20px; border-radius: 10px; font-weight: bold; font-size: 28px; margin-bottom: 25px; border: 1px solid rgba(107, 135, 59, 0.3); }
        
        .ai-content { color: #ccc; font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
        .ai-content b { color: #fff; }

        .btn-buy { background: linear-gradient(180deg, var(--olive) 0%, #465926 100%); color: #fff; padding: 18px; border: none; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 0 #2c3818; cursor: pointer; width: 100%; font-size: 18px; text-transform: uppercase;}
        .btn-buy:active { transform: translateY(4px); box-shadow: none; }

        /* МОДАЛЬНЕ ВІКНО ЗАМОВЛЕННЯ (з твого коду) */
        .order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;}
        .order-box { background: var(--panel); padding: 25px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid var(--olive); }
        .order-box input, .order-box select { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; background: #000; color: #fff; border: 1px solid var(--border); box-sizing: border-box; font-size: 16px;}
        .order-box input:focus, .order-box select:focus { border-color: var(--olive); outline: none; }
        #np-fields { display: block; }
    </style>
</head>
<body>

<div class="nav-top" style="max-width: 800px; margin: 0 auto 20px auto;">
    <a href="shop.html" class="nav-btn">🔙 До вітрини</a>
</div>

<div class="product-container" id="content">
    <div style="padding: 40px; text-align: center; color: #888;">Завантаження даних...</div>
</div>

<div class="order-modal" id="orderModal">
    <div class="order-box">
        <h3 style="color:var(--olive); margin-top:0; text-align:center; font-size: 22px;">Оформлення замовлення</h3>
        <input type="text" id="c-name" placeholder="Ім'я та Прізвище" required>
        <input type="tel" id="c-phone" placeholder="098 588 7331" required oninput="formatPhoneInput(this)">
        
        <select id="c-delivery" onchange="toggleDelivery()">
            <option value="Нова Пошта">🚚 Нова Пошта</option>
            <option value="Самовивіз">🏬 Самовивіз</option>
        </select>
        
        <div id="np-fields">
            <input type="text" id="c-city" placeholder="Місто / Населений пункт">
            <input type="text" id="c-branch" placeholder="Номер відділення (напр. 15)">
        </div>

        <select id="c-payment">
            <option value="Накладений платіж">💵 При отриманні (Накладений)</option>
            <option value="На картку">💳 Переказ на картку</option>
        </select>
        
        <button class="btn-buy" onclick="submitOrder()" style="padding: 14px; font-size: 16px;">ПІДТВЕРДИТИ</button>
        <button class="btn-buy" style="background:transparent; border:1px solid #555; box-shadow:none; margin-top:10px; color:#aaa; padding: 14px;" onclick="closeOrder()">Скасувати</button>
    </div>
</div>

<script>
    const sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
    let activeProduct = null;

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const autoBuy = urlParams.get('buy');
        
        if (!productId) {
            document.getElementById('content').innerHTML = '<div style="padding:40px; text-align:center;">Товар не знайдено</div>';
            return;
        }

        // Завантажуємо товар разом з AI-описом
        const { data: prodData } = await sb.from('products').select('*, ai_content(fancy_description)').eq('id', productId).single();
        
        if (prodData) {
            activeProduct = prodData;
            
            // Динамічний SEO Title
            document.title = `${prodData.title} | Купити`;
            
            // Збираємо фото
            let imgs = prodData.images || [];
            if (imgs.length === 0) {
                imgs = [prodData.image_url_1, prodData.image_url_2, prodData.image_url_3, prodData.image_url_4].filter(Boolean);
            }
            if (imgs.length === 0 && prodData.image_url) imgs = [prodData.image_url];

            let galleryHtml = imgs.map(url => `<img src="${url}">`).join('');
            
            // Формуємо текст опису
            let descText = 'Детальний опис формується...';
            if (prodData.ai_content && prodData.ai_content.length > 0) {
                descText = prodData.ai_content[0].fancy_description;
            } else if (prodData.ai_content && prodData.ai_content.fancy_description) {
                descText = prodData.ai_content.fancy_description;
            } else if (prodData.specs || prodData.benefits) {
                descText = `${prodData.specs || ''}<br><br>${prodData.benefits || ''}`;
            }

            document.getElementById('content').innerHTML = `
                <div class="gallery">${galleryHtml || '<div style="padding:50px; text-align:center;">Фото відсутнє</div>'}</div>
                <div class="info">
                    <h1 class="title">${prodData.title}</h1>
                    <div class="price-tag">${prodData.price} грн</div>
                    <div class="ai-content">${descText}</div>
                    <button class="btn-buy" onclick="openOrder()">🛒 ОФОРМИТИ ЗАМОВЛЕННЯ</button>
                </div>
            `;

            if (autoBuy === 'true') openOrder();
        }
    };

    // --- ЛОГІКА ЗАМОВЛЕННЯ ---
    function openOrder() { document.getElementById('orderModal').style.display = 'flex'; }
    function closeOrder() { document.getElementById('orderModal').style.display = 'none'; }
    function toggleDelivery() {
        const delType = document.getElementById('c-delivery').value;
        document.getElementById('np-fields').style.display = delType === 'Нова Пошта' ? 'block' : 'none';
    }
    
    function formatPhoneInput(el) {
        let val = el.value.replace(/\D/g, ''); 
        if (val.length > 10 && val.startsWith('38')) val = val.substring(2);
        if (val.length > 10) val = val.substring(0, 10);
        let res = '';
        if (val.length > 0) res += val.substring(0, 3);
        if (val.length > 3) res += ' ' + val.substring(3, 6);
        if (val.length > 6) res += ' ' + val.substring(6, 10);
        el.value = res;
    }

    async function submitOrder() {
        const name = document.getElementById('c-name').value;
        const phone = document.getElementById('c-phone').value;
        const payment = document.getElementById('c-payment').value;
        let delivery = document.getElementById('c-delivery').value;
        
        if(!name || !phone) return alert("Введіть ПІБ та телефон!");

        if(delivery === 'Нова Пошта') {
            const city = document.getElementById('c-city').value;
            const branch = document.getElementById('c-branch').value;
            if(!city || !branch) return alert("Введіть місто та номер відділення!");
            delivery = `Нова Пошта (м. ${city}, Відд. №${branch})`;
        }

        const { error } = await sb.from('orders').insert([{
            product_id: activeProduct.id, product_title: activeProduct.title, price: activeProduct.price,
            customer_name: name, customer_phone: phone, delivery: delivery, payment: payment, status: 'Новий'
        }]);

        if (error) { alert("❌ Помилка: " + error.message); return; }

        // Telegram Bot (З твого старого коду)
        const tgBotToken = "8710822645:AAGtAanhJ3LYC-SzxoAUB2vSlE1pHjPqSpA"; 
        const tgChatId = "5268752672"; 
        
        if(tgBotToken && tgChatId) {
            const msg = `🔥 Нове замовлення!\n\n🛒 Товар: ${activeProduct.title}\n💰 Сума: ${activeProduct.price} грн\n\n👤 Клієнт: ${name}\n📞 Телефон: ${phone}\n🚚 Доставка: ${delivery}\n💳 Оплата: ${payment}`;
            try {
                await fetch(`https://api.telegram.org/bot${tgBotToken}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: tgChatId, text: msg })
                });
            } catch (err) { console.error(err); }
        }

        alert("✅ Замовлення успішно оформлено!");
        closeOrder();
        window.location.href = 'shop.html'; // Повертаємо на вітрину після покупки
    }
</script>
</body>
</html>
