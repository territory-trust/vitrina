<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-Pilot | Вітрина</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        /* БАГАТИЙ ОКСАМИТОВИЙ СТИЛЬ - КОМПАКТНА ПРЕМІУМ ВЕРСІЯ */
        :root { --bg: #0d0f12; --panel: #14171c; --olive: #6b873b; --text: #e5e7eb; --border: #2a2e35; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 135px; font-size: 16px; }
        
        .sticky-header { position: fixed; top: 0; left: 0; width: 100%; background: rgba(13, 15, 18, 0.98); z-index: 100; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); padding-bottom: 10px; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px 8px; max-width: 900px; margin: auto; }
        .logo { color: var(--olive); font-size: 20px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap;}
        
        /* Скрольований ряд верхніх кнопок (без емодзі, стильні) */
        .customer-btns { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-left: 10px; }
        .customer-btns::-webkit-scrollbar { display: none; }
        
        .head-btn { background: #1a1e24; color: #aaa; border: 1px solid #333; padding: 6px 14px; border-radius: 20px; text-decoration: none; font-weight: 600; font-size: 12px; white-space: nowrap; transition: 0.2s; }
        .head-btn:active { transform: scale(0.95); }
        .head-btn.smart { color: #fff; border-color: #555; }
        .head-btn.crypto { color: #e5b53a; border-color: #8a6d22; }

        .search-container { padding: 5px 15px; max-width: 900px; margin: auto; }
        .search-box { width: 100%; padding: 12px 16px; border-radius: 10px; background: #000; color: #fff; border: 1px solid var(--border); outline: none; box-sizing: border-box; font-size: 14px; transition: 0.2s;}
        .search-box:focus { border-color: var(--olive); }
        
        .nav-scroll { overflow-x: auto; white-space: nowrap; padding: 10px 15px 0; scrollbar-width: none; max-width: 900px; margin: auto; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { background: transparent; color: #888; border: 1px solid transparent; padding: 6px 14px; border-radius: 15px; margin-right: 6px; font-size: 13px; cursor: pointer; font-weight: 600; transition: 0.2s;}
        .cat-btn.active { background: #1a2e1a; color: var(--olive); border-color: var(--olive); }
        
        /* КОМПАКТНА СІТКА ТА ІДЕАЛЬНО КВАДРАТНІ КАРТКИ */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px 15px; max-width: 900px; margin: auto; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } }
        
        .card { background: var(--panel); border-radius: 14px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        
        /* Квадратне фото */
        .main-p { width: 100%; padding-top: 100%; position: relative; background: #000; border-bottom: 1px solid #222;}
        .main-p img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .card-body { padding: 12px; display: flex; flex-direction: column; flex: 1; }
        .title { font-weight: 600; font-size: 14px; color: #fff; line-height: 1.3; margin-bottom: 8px; height: 36px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price { color: var(--olive); font-size: 16px; font-weight: 900; margin-bottom: 12px; margin-top: auto; }
        
        .card-actions { display: flex; gap: 8px; }
        .btn-action { flex: 1; padding: 10px 4px; border-radius: 8px; font-weight: bold; font-size: 12px; text-align: center; text-decoration: none; display: block; box-sizing: border-box; cursor: pointer; transition: 0.1s;}
        .btn-action:active { transform: translateY(2px); }
        
        .btn-read { background: transparent; border: 1px solid #555; color: #ccc; }
        .btn-buy { background: var(--olive); color: #fff; border: 1px solid var(--olive); box-shadow: 0 2px 0 #2c3818; }
        .btn-buy:active { box-shadow: none; }
        
        .empty-state { grid-column: 1/-1; text-align: center; padding: 40px 20px; color: #888; background: var(--panel); border-radius: 12px; border: 1px dashed #444; font-size: 14px;}
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="header-top">
        <div class="logo" id="shopLogo">SmartMarket</div>
        <div class="customer-btns">
            <a href="https://ai-pilot.com.ua/" class="head-btn smart">SmartMarket</a>
            <a href="ai_hub.html" class="head-btn">AI-Помічники</a>
            <a href="#" class="head-btn crypto">Крипто-Аналітика</a>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="Пошук товарів..." oninput="filter()" autocomplete="off">
    </div>
    
    <div class="nav-scroll" id="cat-container">
        <button class="cat-btn active" onclick="setCat('Все', this)">Всі товари</button>
    </div>
</div>

<div class="grid" id="grid">
    <div class="empty-state">Завантаження товарів...</div>
</div>

<script>
    const sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
    let items = [];

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const ownerId = urlParams.get('owner');

        let query;

        // СУВОРА ІЗОЛЯЦІЯ: Якщо є ID магазину, вантажимо ТІЛЬКИ його товари
        if (ownerId) {
            query = sb.from('products').select('*')
                      .eq('owner_id', ownerId)
                      .in('status', ['В наявності', 'available'])
                      .order('created_at', { ascending: false });
            
            // Підтягуємо ім'я магазину для шапки
            const { data: shopData } = await sb.from('shops').select('shop_name').eq('owner_id', ownerId).single();
            if(shopData && shopData.shop_name) {
                document.getElementById('shopLogo').innerText = shopData.shop_name;
                document.title = `${shopData.shop_name} | Магазин`;
            }
        } else {
            // Якщо ID немає (глобальний SmartMarket)
            query = sb.from('products').select('*')
                      .in('status', ['В наявності', 'available'])
                      .order('created_at', { ascending: false });
        }

        const { data } = await query;
        if(data) { 
            items = data; 
            renderCats(items);
            render(items); 
        }
    };

    function renderCats(list) {
        const container = document.getElementById('cat-container');
        const cats = [...new Set(list.map(i => i.category).filter(Boolean))];
        cats.forEach(c => {
            container.innerHTML += `<button class="cat-btn" onclick="setCat('${c}', this)">${c}</button>`;
        });
    }

    function render(list) {
        const g = document.getElementById('grid'); g.innerHTML = '';
        if(list.length === 0) return g.innerHTML = `<div class="empty-state">😕 Товарів поки немає</div>`;

        list.forEach(p => {
            let imgUrl = p.image_url_1 || (p.images && p.images[0]) || p.image_url || '';
            g.innerHTML += `
                <div class="card">
                    <div class="main-p">
                        <img src="${imgUrl}" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='">
                    </div>
                    <div class="card-body">
                        <div class="title">${p.title || 'Без назви'}</div>
                        <div class="price">${p.price} грн</div>
                        <div class="card-actions">
                            <a href="product.html?id=${p.id}" class="btn-action btn-read">Опис</a>
                            <a href="product.html?id=${p.id}&buy=true" class="btn-action btn-buy">Купити</a>
                        </div>
                    </div>
                </div>`;
        });
    }

    function filter() {
        const v = document.getElementById('search').value.toLowerCase();
        render(items.filter(i => (`${i.title} ${i.category}`).toLowerCase().includes(v)));
    }

    function setCat(c, b) {
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        render(c === 'Все' ? items : items.filter(i => i.category === c));
    }
</script>
</body>
</html>
