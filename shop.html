<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-Pilot | Вітрина Магазину</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        /* БАГАТИЙ ОКСАМИТОВИЙ СТИЛЬ + СЕРЕДНІЙ ШРИФТ */
        :root { --bg: #0d0f12; --panel: #14171c; --olive: #6b873b; --text: #e5e7eb; --border: #2a2e35; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 140px; font-size: 16px; }
        
        .sticky-header { position: fixed; top: 0; left: 0; width: 100%; background: rgba(13, 15, 18, 0.95); z-index: 100; border-bottom: 1px solid var(--border); backdrop-filter: blur(8px); padding-bottom: 10px; }
        .header-content { padding: 10px 15px; max-width: 900px; margin: auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;}
        .logo { color: var(--olive); font-size: 22px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase;}
        .search-box { width: calc(100% - 30px); margin: 0 15px; padding: 14px; border-radius: 10px; background: #000; color: #fff; border: 1px solid var(--olive); outline: none; box-sizing: border-box; font-size: 16px;}
        
        /* Кнопки покупця (Ті самі 3 обов'язкові) */
        .customer-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .head-btn { background: #1c2128; color: var(--olive); border: 1px solid var(--olive); padding: 8px 12px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; box-shadow: 0 4px 0 #111; transition: 0.1s; }
        .head-btn:active { transform: translateY(2px); box-shadow: none; }
        .head-btn.smart { border-color: #fff; color: #fff; }
        .head-btn.crypto { background: linear-gradient(180deg, #2a2e35 0%, #14171c 100%); color: #f3ba2f; border-color: #f3ba2f; }

        /* Кнопка власника */
        #admin-btn { display: none; background: #222; color: #fff; border: 1px solid #555; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; width: 100%; text-align: center; margin-top: 5px; }

        .nav-scroll { overflow-x: auto; white-space: nowrap; padding: 10px 15px 0; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--panel); color: #aaa; border: 1px solid #333; padding: 10px 20px; border-radius: 20px; margin-right: 5px; font-size: 15px; cursor: pointer; font-weight: 500; transition: 0.2s;}
        .cat-btn.active { background: var(--olive); color: #fff; font-weight: bold; border-color: var(--olive); }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 900px; margin: auto; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); } }
        
        .card { background: var(--panel); border-radius: 16px; border: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; position: relative; height: 100%; box-sizing: border-box;}
        .main-p { width: 100%; aspect-ratio: 1; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 12px; border: 1px solid #222; display: flex; align-items: center; justify-content: center;}
        img { width: 100%; height: 100%; object-fit: cover; }
        
        .title { font-weight: 800; font-size: 16px; color: #fff; line-height: 1.3; margin-bottom: 8px; height: 62px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .price { color: var(--olive); font-size: 22px; font-weight: 900; margin-bottom: 15px; }
        
        .btn-buy { background: linear-gradient(180deg, var(--olive) 0%, #465926 100%); color: #fff; padding: 14px; border: none; border-radius: 10px; font-weight: bold; box-shadow: 0 4px 0 #2c3818; cursor: pointer; width: 100%; font-size: 16px; text-align: center; text-decoration: none; display: block; box-sizing: border-box;}
        .btn-buy:active { transform: translateY(4px); box-shadow: none; }
        .btn-outline { background: transparent; border: 1.5px solid var(--olive); color: var(--olive); box-shadow: none; margin-bottom: 10px; }
        
        .empty-state { grid-column: 1/-1; text-align: center; padding: 40px 20px; color: #888; background: var(--panel); border-radius: 16px; border: 1px dashed #444;}
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="header-content">
        <div class="logo" id="shopLogo">Вітрина</div>
        
        <div class="customer-btns">
            <a href="https://ai-pilot.com.ua/" class="head-btn smart">SmartMarket</a>
            <a href="ai_hub.html" class="head-btn">🤖 AI-Помічники</a>
            <a href="#" class="head-btn crypto">💎 Зведення криптовалют</a>
        </div>
        <a href="cabinet.html" id="admin-btn">🔑 Повернутися в Кабінет (Власник)</a>
    </div>
    
    <input type="text" id="search" class="search-box" placeholder="🔍 Пошук товарів..." oninput="filter()">
    
    <div class="nav-scroll" id="cat-container">
        <button class="cat-btn active" onclick="setCat('Все', this)">Всі товари</button>
        </div>
</div>

<div class="grid" id="grid">
    <div class="empty-state">Завантаження товарів...</div>
</div>

<script>
    const sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
    let items = [];

    window.onload = () => {
        // Перевірка чи зайшов власник
        if (localStorage.getItem('is_admin') === 'true') {
            document.getElementById('admin-btn').style.display = 'block';
        }
        load();
    };

    async function load() {
        // У майбутньому тут буде фільтр по shop_id з URL, зараз вантажимо всі доступні
        const { data } = await sb.from('products').select('*').in('status', ['В наявності', 'available']).order('created_at', { ascending: false });
        if(data) { 
            items = data; 
            renderCats(items);
            render(items); 
        }
    }

    function renderCats(list) {
        const container = document.getElementById('cat-container');
        // Отримуємо унікальні категорії
        const cats = [...new Set(list.map(i => i.category).filter(Boolean))];
        cats.forEach(c => {
            container.innerHTML += `<button class="cat-btn" onclick="setCat('${c}', this)">${c}</button>`;
        });
    }

    function render(list) {
        const g = document.getElementById('grid'); g.innerHTML = '';
        if(list.length === 0) return g.innerHTML = `<div class="empty-state"><h3>😕 Нічого не знайдено</h3></div>`;

        list.forEach(p => {
            // Підтримка старої та нової структури зображень
            let imgUrl = p.image_url_1 || (p.images && p.images[0]) || p.image_url || '';
            
            g.innerHTML += `
                <div class="card">
                    <div class="main-p"><img src="${imgUrl}" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='"></div>
                    <div class="title">${p.title || 'Без назви'}</div>
                    <div class="price">${p.price} грн</div>
                    
                    <div style="margin-top: auto;">
                        <a href="product.html?id=${p.id}" class="btn-buy btn-outline">📄 Читати опис</a>
                        <a href="product.html?id=${p.id}&buy=true" class="btn-buy">ЗАМОВИТИ</a>
                    </div>
                </div>`;
        });
    }

    function filter() {
        const v = document.getElementById('search').value.toLowerCase();
        render(items.filter(i => (`${i.title} ${i.category}`).toLowerCase().includes(v)));
    }

    function setCat(c, b) {
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        render(c === 'Все' ? items : items.filter(i => i.category === c));
    }
</script>
</body>
</html>
