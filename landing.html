<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-Pilot | Створення магазину</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { 
            --bg: #0d0f12; --panel: #14171c; --olive: #6b873b; 
            --olive-light: rgba(107, 135, 59, 0.7); 
            --text: #e5e7eb; --border: #2a2e35; 
        }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; /* Жорстка прив'язка до висоти екрану */
            padding: 15px; box-sizing: border-box; 
            overflow: hidden; /* Ховаємо скрол, робимо як нативний додаток */
        }
        
        .card { 
            background: var(--panel); 
            padding: 25px 20px; /* Зменшили внутрішні відступи для компактності */
            border-radius: 20px; 
            border: 1px solid var(--border); 
            width: 100%; max-width: 440px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            box-sizing: border-box;
        }
        
        .logo-img {
            max-width: 65%; /* Оптимізували розмір для економії місця */
            height: auto;
            display: block;
            margin: 0 auto 10px auto; /* Підняли максимально високо */
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.6)); 
        }
        
        /* Читабельний, але компактний підзаголовок у 2 рядки */
        p { 
            text-align: center; 
            color: #d1d5db; 
            font-size: 16px; 
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 15px; 
            line-height: 1.3; 
        }
        
        label { 
            display: block; 
            margin-bottom: 5px; 
            color: #e5e7eb; 
            font-weight: 600; 
            font-size: 16px; 
        }
        
        input { 
            width: 100%; padding: 14px; background: #000; 
            border: 1px solid var(--olive-light); 
            color: #fff; border-radius: 12px; font-size: 16px; 
            margin-bottom: 15px; outline: none; box-sizing: border-box; 
            transition: 0.3s ease; 
        }
        
        input:focus { 
            border-color: var(--olive); 
            box-shadow: 0 0 0 2px rgba(107, 135, 59, 0.3); 
        }
        
        /* Багата оксамитова кнопка */
        .btn-3d { 
            background: linear-gradient(180deg, var(--olive) 0%, #465926 100%); 
            color: #fff; padding: 16px; border-radius: 12px; 
            font-weight: bold; font-size: 18px; border: none; cursor: pointer; 
            box-shadow: 0 4px 0 #2c3818; width: 100%; display: block; 
            text-align: center; transition: 0.1s ease; margin-top: 5px; 
        }
        .btn-3d:active { transform: translateY(4px); box-shadow: none; }
        .btn-3d:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .switch-mode { text-align: center; margin-top: 20px; color: #888; font-size: 15px; }
        .switch-mode span { color: var(--olive); font-weight: bold; cursor: pointer; text-decoration: underline;}
        
        #errorMsg { 
            color: #ff4444; text-align: center; margin-top: 10px; 
            display: none; font-size: 14px; background: rgba(255, 68, 68, 0.1); 
            padding: 10px; border-radius: 10px; border: 1px solid rgba(255, 68, 68, 0.3);
        }
    </style>
</head>
<body>

<div class="card">
    <img src="logo.jpg" alt="AI-Pilot Shops" class="logo-img">
    
    <p id="subtitle">Створіть розумний інтернет-магазин<br>за 1 хвилину.</p>

    <div id="registerFields">
        <label>Назва вашого магазину:</label>
        <input type="text" id="shopName" placeholder="Наприклад: КАНЦЛЕР">
        
        <label>Ваше Ім'я:</label>
        <input type="text" id="userName" placeholder="Наприклад: Вадим">
    </div>

    <label>Ваш телефон:</label>
    <input type="tel" id="phone" placeholder="098 555 44 22" maxlength="13" oninput="formatPhone(this)">

    <button class="btn-3d" id="mainBtn" onclick="handleAuth()">🚀 СТВОРИТИ МАГАЗИН</button>
    <div id="errorMsg"></div>

    <div class="switch-mode" id="switchText">
        Вже є магазин? <span onclick="toggleMode()">Увійти за телефоном</span>
    </div>
</div>

<script>
    const sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
    let isLogin = false;

    function formatPhone(input) {
        let val = input.value.replace(/\D/g, '');
        let res = '';
        if (val.length > 0) res += val.substring(0, 3);
        if (val.length > 3) res += ' ' + val.substring(3, 6);
        if (val.length > 6) res += ' ' + val.substring(6, 8);
        if (val.length > 8) res += ' ' + val.substring(8, 10);
        input.value = res;
    }

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('registerFields').style.display = isLogin ? 'none' : 'block';
        document.getElementById('mainBtn').innerHTML = isLogin ? '🔑 УВІЙТИ В КАБІНЕТ' : '🚀 СТВОРИТИ МАГАЗИН';
        
        // Зберігаємо форматування у 2 рядки для обох режимів
        document.getElementById('subtitle').innerHTML = isLogin 
            ? 'Вхід у панель керування<br>вашим магазином.' 
            : 'Створіть розумний інтернет-магазин<br>за 1 хвилину.';
            
        document.getElementById('switchText').innerHTML = isLogin 
            ? 'Новий користувач? <span onclick="toggleMode()">Створити магазин</span>' 
            : 'Вже є магазин? <span onclick="toggleMode()">Увійти за телефоном</span>';
        document.getElementById('errorMsg').style.display = 'none';
    }

    function showError(msg) {
        const e = document.getElementById('errorMsg');
        e.innerHTML = '❌ Помилка: ' + msg;
        e.style.display = 'block';
    }

    async function handleAuth() {
        const phoneRaw = document.getElementById('phone').value.replace(/\D/g, '');
        if (phoneRaw.length !== 10) return showError('Введіть коректний номер телефону (10 цифр)');
        
        const email = `${phoneRaw}@ai-pilot.com.ua`;
        const password = `Pass${phoneRaw}!`;
        const btn = document.getElementById('mainBtn');
        btn.disabled = true; document.getElementById('errorMsg').style.display = 'none';

        try {
            if (isLogin) {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw new Error('Користувача не знайдено або невірний номер.');
                window.location.href = 'cabinet.html';
            } else {
                const shopName = document.getElementById('shopName').value.trim();
                const userName = document.getElementById('userName').value.trim();
                if (!shopName || !userName) throw new Error('Заповніть всі поля!');

                const { data: authData, error: authErr } = await sb.auth.signUp({ email, password });
                if (authErr) {
                    if (authErr.message.includes('already registered')) throw new Error('Цей номер вже зареєстровано. Увійдіть.');
                    throw authErr;
                }

                if (authData.user) {
                    const { error: dbErr } = await sb.from('shops').insert([{
                        owner_id: authData.user.id,
                        name: shopName,
                        shop_name: shopName,
                        theme_color: 'dark',
                        is_demo: false
                    }]);
                    if (dbErr) throw dbErr;
                    window.location.href = 'cabinet.html';
                }
            }
        } catch (err) {
            showError(err.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
