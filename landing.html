<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-Pilot | Створення магазину</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#051622">
    <link rel="apple-touch-icon" href="app-icon-v2.jpg?v=4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            /* Палітра Dark Ocean */
            --bg-ocean-top: #051622;
            --bg-ocean-bottom: #01050a;
            --panel-bg: rgba(10, 34, 53, 0.85);
            --border-neon: rgba(42, 139, 242, 0.4);
            --accent-neon: #2a8bf2;
            --accent-hover: #1565c0;
            --text-main: #e2f1ff;
            --text-muted: #7d9cb8;
            --input-bg: rgba(2, 10, 16, 0.7);
        }
        
        /* ХІРУРГІЧНЕ ВТРУЧАННЯ: Фікс світлої системної панелі навігації Android */
        html {
            background-color: var(--bg-ocean-bottom);
        }

        body { 
            background-color: var(--bg-ocean-bottom);
            background-image: linear-gradient(180deg, var(--bg-ocean-top) 0%, var(--bg-ocean-bottom) 100%); 
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; /* Ідеальне центрування */
            min-height: 100dvh; /* Займає рівно 1 екран мобільного */
            padding: 15px; 
            box-sizing: border-box; 
        }
        
        .card { 
            background: var(--panel-bg); 
            padding: 25px 20px; /* Компактніші відступы для вміщення в 1 екран */
            border-radius: 20px; 
            border: 1px solid var(--border-neon); 
            width: 100%; max-width: 440px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 15px rgba(42, 139, 242, 0.1); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        
        .logo-img {
            max-width: 55%; /* Зменшено для компактності */
            height: auto;
            display: block;
            margin: 0 auto 10px auto; /* Менше "повітря" */
            filter: drop-shadow(0 0 15px rgba(42, 139, 242, 0.4)); /* Неонове світіння навколо лого */
            border-radius: 12px;
        }
        
        p { 
            text-align: center; 
            color: #fff; /* ХІРУРГІЧНЕ ВТРУЧАННЯ: Зробили білим */
            font-size: 15px; 
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 20px; 
            line-height: 1.3; 
        }
        
        label { 
            display: block; 
            margin-bottom: 4px; 
            color: var(--accent-neon); 
            font-weight: 700; 
            font-size: 14px; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        /* Додано захист від зміни фону автозаповненням браузера */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #081b2c inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        input { 
            width: 100%; padding: 12px 14px; 
            background: var(--input-bg); 
            border: 1px solid var(--border-neon); 
            color: #fff; border-radius: 10px; font-size: 15px; 
            margin-bottom: 14px; outline: none; box-sizing: border-box; 
            transition: 0.3s ease; 
            font-weight: 600;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        
        input::placeholder {
            color: rgba(226, 241, 255, 0.6); 
            font-weight: normal;
        }
        
        input:focus { 
            border-color: var(--accent-neon); 
            box-shadow: 0 0 0 2px rgba(42, 139, 242, 0.3), inset 0 2px 4px rgba(0,0,0,0.3); 
            background: rgba(0,0,0,0.6);
        }
        
        /* Кнопка Dark Ocean */
        .btn-3d { 
            background: linear-gradient(180deg, var(--accent-neon) 0%, var(--accent-hover) 100%); 
            color: #fff; 
            padding: 14px; border-radius: 10px; 
            font-weight: 900; font-size: 16px; border: none; cursor: pointer; 
            box-shadow: 0 4px 0 #0d3d73, 0 8px 15px rgba(0,0,0,0.4); 
            width: 100%; display: block; 
            text-align: center; transition: 0.1s ease; 
            margin-top: 5px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-3d:active { 
            transform: translateY(4px); 
            box-shadow: 0 0 0 #0d3d73, 0 2px 4px rgba(0,0,0,0.4); 
        }
        .btn-3d:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .switch-mode { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 14px; }
        .switch-mode span { color: var(--accent-neon); font-weight: bold; cursor: pointer; text-decoration: underline; transition: 0.2s;}
        .switch-mode span:active { opacity: 0.7; }
        
        #errorMsg { 
            color: #fca5a5; text-align: center; margin-top: 12px; 
            display: none; font-size: 13px; background: rgba(239, 68, 68, 0.15); 
            padding: 10px; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.3);
            font-weight: 600;
        }

        /* Адаптація для дуже маленьких екранів, щоб не обрізало при відкритті клавіатури */
        @media (max-height: 600px) {
            .logo-img { max-width: 40%; margin-bottom: 5px; }
            .card { padding: 15px; }
            input { padding: 10px; margin-bottom: 10px; }
            p { margin-bottom: 15px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="card">
    <img src="1000007790.jpg" alt="AI-Pilot Shops" class="logo-img">
    
    <p id="subtitle">Створіть розумний інтернет-магазин<br>за 1 хвилину.</p>

    <div id="registerFields">
        <label>Назва вашого магазину:</label>
        <input type="text" id="shopName" placeholder="Наприклад: Мото-запчастини">
        
        <label>Ваше Ім'я:</label>
        <input type="text" id="userName" placeholder="Наприклад: Вадим">
    </div>

    <label>Ваш телефон:</label>
    <input type="tel" id="phone" placeholder="098 555 44 22" maxlength="25" oninput="formatPhone(this)">

    <button class="btn-3d" id="mainBtn" onclick="handleAuth()">🚀 СТВОРИТИ МАГАЗИН</button>
    <div id="errorMsg"></div>

    <div class="switch-mode" id="switchText">
        Вже є магазин? <span onclick="toggleMode()">Увійти за телефоном</span>
    </div>
</div>

<script>
    const sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
    let isLogin = false;

    // --- РОЗУМНИЙ АВТОВХІД ---
    sb.auth.getSession().then(({ data: { session } }) => {
        if (session) {
            window.location.replace('cabinet.html');
        }
    });

    function formatPhone(input) {
        // 1. Беремо тільки цифри з того, що вставила система
        let val = input.value.replace(/\D/g, '');
        
        // 2. Якщо система вставила номер з кодом країни, жорстко відрізаємо
        if (val.startsWith('380')) {
            val = val.substring(2); // залишається '0...'
        } else if (val.startsWith('80')) {
            val = val.substring(1); // залишається '0...'
        } else if (val.startsWith('38')) {
            val = '0' + val.substring(2); // якщо вставило 38 без нуля
        }
        
        // 3. БРОНЕБІЙНА ПЕРЕВІРКА НА НУЛЬ: Якщо після всіх чисток номер не починається з нуля (наприклад 985...), ставимо нуль примусово
        if (val.length > 0 && val[0] !== '0') {
            val = '0' + val;
        }

        // 4. Залишаємо рівно 10 цифр українського формату
        val = val.substring(0, 10);

        // 5. Красиво розставляємо пробіли
        let res = '';
        if (val.length > 0) res += val.substring(0, 3);
        if (val.length > 3) res += ' ' + val.substring(3, 6);
        if (val.length > 6) res += ' ' + val.substring(6, 8);
        if (val.length > 8) res += ' ' + val.substring(8, 10);
        
        input.value = res;
    }

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('registerFields').style.display = isLogin ? 'none' : 'block';
        document.getElementById('mainBtn').innerHTML = isLogin ? '🔑 УВІЙТИ В КАБІНЕТ' : '🚀 СТВОРИТИ МАГАЗИН';
        
        document.getElementById('subtitle').innerHTML = isLogin 
            ? 'Вхід у панель керування<br>вашим магазином.' 
            : 'Створіть розумний інтернет-магазин<br>за 1 хвилину.';
            
        document.getElementById('switchText').innerHTML = isLogin 
            ? 'Новий користувач? <span onclick="toggleMode()">Створити магазин</span>' 
            : 'Вже є магазин? <span onclick="toggleMode()">Увійти за телефоном</span>';
        document.getElementById('errorMsg').style.display = 'none';
    }

    function showError(msg) {
        const e = document.getElementById('errorMsg');
        e.innerHTML = '❌ Помилка: ' + msg;
        e.style.display = 'block';
    }

    async function handleAuth() {
        const phoneRaw = document.getElementById('phone').value.replace(/\D/g, '');
        if (phoneRaw.length !== 10) return showError('Введіть коректний номер телефону (10 цифр)');
        
        const email = `${phoneRaw}@ai-pilot.com.ua`;
        const password = `Pass${phoneRaw}!`;
        const btn = document.getElementById('mainBtn');
        btn.disabled = true; document.getElementById('errorMsg').style.display = 'none';

        try {
            if (isLogin) {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw new Error('Користувача не знайдено або невірний номер.');
                window.location.href = 'cabinet.html';
            } else {
                const shopName = document.getElementById('shopName').value.trim();
                const userName = document.getElementById('userName').value.trim();
                if (!shopName || !userName) throw new Error('Заповніть всі поля!');

                const { data: authData, error: authErr } = await sb.auth.signUp({ email, password });
                if (authErr) {
                    if (authErr.message.includes('already registered')) throw new Error('Цей номер вже зареєстровано. Увійдіть.');
                    throw authErr;
                }

                if (authData.user) {
                    const { error: dbErr } = await sb.from('shops').insert([{
                        owner_id: authData.user.id,
                        name: shopName,
                        shop_name: shopName,
                        theme_color: 'ocean',
                        is_demo: false
                    }]);
                    if (dbErr) throw dbErr;
                    window.location.href = 'cabinet.html';
                }
            }
        } catch (err) {
            showError(err.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
